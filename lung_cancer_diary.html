<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="看護日誌">
<title>看護日誌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f2;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --text: #1a1814;
  --text2: #6b6660;
  --text3: #a09b96;
  --blue: #1a5fa8;
  --blue-light: #deeaf8;
  --blue-mid: #4a8fd4;
  --green: #2d7a4a;
  --green-light: #dff0e6;
  --amber: #b86b00;
  --amber-light: #fdf0d8;
  --red: #b83232;
  --red-light: #fde8e8;
  --teal: #1a7a6a;
  --teal-light: #d8f0ec;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #161412;
    --surface: #1e1b18;
    --surface2: #272420;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --text2: #a09b96;
    --text3: #6b6660;
    --blue-light: #1a3a5c;
    --green-light: #1a3a28;
    --amber-light: #3a2800;
    --red-light: #3a1a1a;
    --teal-light: #0a2a26;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--text); }
body { display: flex; flex-direction: column; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.04em; }
.header-date { font-size: 11px; color: var(--text2); margin-top: 1px; }
.date-nav { display: flex; gap: 4px; align-items: center; }
.nav-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.nav-btn:hover { background: var(--surface); }
.today-btn {
  padding: 0 10px; height: 30px; border-radius: 15px;
  border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; font-size: 11px; font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all .15s;
}
.today-btn:hover { background: var(--blue-light); color: var(--blue); }

/* Drive status */
.drive-bar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px;
}
.drive-status { display: flex; align-items: center; gap: 6px; color: var(--text2); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.status-dot.connected { background: #2d7a4a; }
.status-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.drive-btn {
  padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--border2);
  background: var(--surface); color: var(--text2);
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: all .15s;
}
.drive-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }
.drive-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
.drive-btn.primary:hover { background: #154e8a; }

/* Tabs */
.tab-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1; min-width: 60px; padding: 12px 8px;
  border: none; background: transparent;
  font-size: 12px; font-weight: 500; color: var(--text3);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s; font-family: 'Noto Sans JP', sans-serif;
  white-space: nowrap;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* Main */
.main { flex: 1; overflow-y: auto; padding: 12px 16px 100px; }
.section { display: none; }
.section.active { display: block; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 12px;
}

/* Vitals */
.vitals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.vital-item { display: flex; flex-direction: column; gap: 5px; }
.vital-label { font-size: 11px; color: var(--text2); }
.vital-input-wrap { display: flex; align-items: center; gap: 5px; }
.vital-input {
  flex: 1; padding: 9px 10px; font-size: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: 'Noto Sans JP', sans-serif;
  transition: border-color .15s;
}
.vital-input:focus { outline: none; border-color: var(--blue-mid); }
.vital-unit { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 6px 12px; border-radius: 20px; font-size: 12px;
  cursor: pointer; user-select: none;
  border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text2);
  transition: all .15s; font-family: 'Noto Sans JP', sans-serif;
}
.chip.selected { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }

/* Condition */
.cond-wrap { display: flex; gap: 5px; }
.cond-btn {
  flex: 1; padding: 10px 4px; text-align: center;
  border-radius: var(--radius-sm); font-size: 11px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; transition: all .15s;
  font-family: 'Noto Sans JP', sans-serif; line-height: 1.5;
}
.cond-btn .emoji { font-size: 18px; display: block; }
.cond-btn.sel-5 { background: var(--green-light); color: var(--green); border-color: #6dbe8e; }
.cond-btn.sel-4 { background: var(--teal-light); color: var(--teal); border-color: #5dc0ae; }
.cond-btn.sel-3 { background: var(--amber-light); color: var(--amber); border-color: #e8aa50; }
.cond-btn.sel-2 { background: #fff0e8; color: #b05a20; border-color: #e89060; }
.cond-btn.sel-1 { background: var(--red-light); color: var(--red); border-color: #e87878; }

/* Textarea */
.textarea {
  width: 100%; padding: 10px; font-size: 14px; line-height: 1.7;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  resize: vertical; min-height: 80px; transition: border-color .15s;
}
.textarea:focus { outline: none; border-color: var(--blue-mid); }

/* Photo */
.photo-drop {
  border: 2px dashed var(--border2); border-radius: var(--radius-sm);
  padding: 16px; text-align: center; cursor: pointer;
  color: var(--text3); font-size: 13px; transition: all .15s;
}
.photo-drop:hover, .photo-drop:active { border-color: var(--blue-mid); color: var(--blue); }
.photo-drop .icon { font-size: 22px; margin-bottom: 4px; }
.thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.thumb {
  width: 76px; height: 76px; object-fit: cover;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  cursor: pointer;
}
.thumb-del-wrap { position: relative; display: inline-block; }
.thumb-del {
  position: absolute; top: -5px; right: -5px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--red); color: white;
  font-size: 10px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none;
}

/* Save button */
.save-btn {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
  background: var(--blue); color: white;
  border: none; border-radius: var(--radius);
  cursor: pointer; transition: all .15s;
  font-family: 'Noto Sans JP', sans-serif;
  margin-bottom: 10px; letter-spacing: 0.02em;
}
.save-btn:hover { background: #154e8a; }
.save-btn:active { transform: scale(.98); }
.save-btn.secondary {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border2);
}
.save-btn.secondary:hover { background: var(--blue-light); color: var(--blue); }

/* History */
.history-item {
  border-left: 3px solid var(--blue-mid);
  padding-left: 12px; margin-bottom: 14px;
}
.history-date { font-size: 11px; color: var(--text2); margin-bottom: 5px; display: flex; gap: 6px; align-items: center; }
.badge {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
}
.badge.blue { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }
.badge.green { background: var(--green-light); color: var(--green); }
.badge.amber { background: var(--amber-light); color: var(--amber); }
.badge.red { background: var(--red-light); color: var(--red); }
.vitals-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
.history-note { font-size: 13px; color: var(--text); line-height: 1.6; }

/* Chart */
.chart-wrap { position: relative; height: 170px; margin-bottom: 4px; }

/* Exam */
.row { display: flex; gap: 8px; }
.input-sm {
  padding: 9px 10px; font-size: 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'Noto Sans JP', sans-serif; transition: border-color .15s;
}
.input-sm:focus { outline: none; border-color: var(--blue-mid); }
.exam-item {
  padding: 12px 0; border-bottom: 1px solid var(--border);
  display: flex; gap: 10px;
}
.exam-item:last-child { border-bottom: none; }
.exam-body { flex: 1; }
.exam-del { font-size: 11px; color: var(--text3); cursor: pointer; padding: 4px; flex-shrink: 0; }
.exam-del:hover { color: var(--red); }

/* AI */
.ai-mode-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.ai-mode-btn {
  flex: 1; padding: 9px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .15s;
}
.ai-mode-btn.active { background: var(--blue-light); color: var(--blue); border-color: var(--blue-mid); }
.ai-panel { display: none; }
.ai-panel.active { display: block; }
.ai-ask-btn {
  width: 100%; padding: 12px; font-size: 14px; font-weight: 700;
  background: var(--blue); color: white; border: none;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; transition: all .15s; margin-top: 8px;
}
.ai-ask-btn:hover { background: #154e8a; }
.ai-ask-btn:disabled { background: var(--text3); cursor: not-allowed; }
.ai-log-item {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px; margin-bottom: 8px;
}
.ai-log-q { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.ai-log-a { font-size: 12px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
.ai-log-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.ai-log-del { font-size: 11px; color: var(--text3); cursor: pointer; }
.ai-log-del:hover { color: var(--red); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1814; color: #f0ede8;
  padding: 11px 20px; border-radius: 24px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 9999;
  white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; }

/* Empty state */
.empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }

/* Spinner */
.spinner {
  width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: white; border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px; max-width: 340px; width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
.modal h3 { font-size: 15px; margin-bottom: 10px; }
.modal p { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 14px; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button { flex: 1; padding: 11px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; border: 1px solid var(--border2); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">看護日誌</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDate(-1)">‹</button>
    <button class="today-btn" onclick="changeDate(0)">今日</button>
    <button class="nav-btn" onclick="changeDate(1)">›</button>
  </div>
</div>

<!-- Drive bar -->
<div class="drive-bar">
  <div class="drive-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Googleドライブ: 未接続</span>
  </div>
  <div style="display:flex;gap:6px">
    <button class="drive-btn" id="syncBtn" onclick="manualSync()" style="display:none">同期</button>
    <button class="drive-btn primary" id="driveLoginBtn" onclick="driveLogin()">Googleでログイン</button>
  </div>
</div>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('record',this)">記録</button>
  <button class="tab-btn" onclick="switchTab('exams',this)">検査</button>
  <button class="tab-btn" onclick="switchTab('history',this)">履歴</button>
  <button class="tab-btn" onclick="switchTab('ai',this)">AI調査</button>
</div>

<!-- Main -->
<div class="main">

  <!-- 記録タブ -->
  <div id="sec-record" class="section active">
    <div class="card">
      <div class="card-title">バイタルサイン</div>
      <div class="vitals-grid">
        <div class="vital-item">
          <div class="vital-label">血中酸素 (SpO2)</div>
          <div class="vital-input-wrap">
            <input class="vital-input" type="number" id="spo2" placeholder="98" min="70" max="100" inputmode="numeric">
            <span class="vital-unit">%</span>
          </div>
        </div>
        <div class="vital-item">
          <div class="vital-label">脈拍</div>
          <div class="vital-input-wrap">
            <input class="vital-input" type="number" id="pulse" placeholder="72" inputmode="numeric">
            <span class="vital-unit">bpm</span>
          </div>
        </div>
        <div class="vital-item">
          <div class="vital-label">血圧（上 / 下）</div>
          <div class="vital-input-wrap">
            <input class="vital-input" type="number" id="bpSys" placeholder="120" inputmode="numeric" style="width:46%">
            <span style="font-size:13px;color:var(--text3)">/</span>
            <input class="vital-input" type="number" id="bpDia" placeholder="80" inputmode="numeric" style="width:46%">
          </div>
        </div>
        <div class="vital-item">
          <div class="vital-label">体温</div>
          <div class="vital-input-wrap">
            <input class="vital-input" type="number" id="temp" placeholder="36.5" step="0.1" inputmode="decimal">
            <span class="vital-unit">°C</span>
          </div>
        </div>
        <div class="vital-item">
          <div class="vital-label">体重</div>
          <div class="vital-input-wrap">
            <input class="vital-input" type="number" id="weight" placeholder="55.0" step="0.1" inputmode="decimal">
            <span class="vital-unit">kg</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">今日のイベント（複数選択可）</div>
      <div class="chips" id="eventChips">
        <div class="chip" onclick="toggleChip(this)" data-val="診察">診察</div>
        <div class="chip" onclick="toggleChip(this)" data-val="血液検査">血液検査</div>
        <div class="chip" onclick="toggleChip(this)" data-val="点滴">点滴</div>
        <div class="chip" onclick="toggleChip(this)" data-val="CT">CT</div>
        <div class="chip" onclick="toggleChip(this)" data-val="MRI">MRI</div>
        <div class="chip" onclick="toggleChip(this)" data-val="レントゲン">レントゲン</div>
        <div class="chip" onclick="toggleChip(this)" data-val="投薬変更">投薬変更</div>
        <div class="chip" onclick="toggleChip(this)" data-val="入院">入院</div>
        <div class="chip" onclick="toggleChip(this)" data-val="退院">退院</div>
        <div class="chip" onclick="toggleChip(this)" data-val="外出">外出</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">今日の体調</div>
      <div class="cond-wrap">
        <button class="cond-btn" onclick="selectCond(5,this)"><span class="emoji">😊</span>良好</button>
        <button class="cond-btn" onclick="selectCond(4,this)"><span class="emoji">🙂</span>まあまあ</button>
        <button class="cond-btn" onclick="selectCond(3,this)"><span class="emoji">😐</span>普通</button>
        <button class="cond-btn" onclick="selectCond(2,this)"><span class="emoji">😔</span>しんどい</button>
        <button class="cond-btn" onclick="selectCond(1,this)"><span class="emoji">😞</span>かなり辛い</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">メモ（体調・出来事・気になること）</div>
      <textarea class="textarea" id="noteText" placeholder="自由に記録してください..."></textarea>
    </div>

    <div class="card">
      <div class="card-title">写真（検査画像・日常記録）</div>
      <div class="photo-drop" onclick="document.getElementById('photoInput').click()">
        <div class="icon">📷</div>
        タップして写真を追加
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="addPhotos(this,'photoThumbs','recPhotos')">
      <div class="thumbs" id="photoThumbs"></div>
    </div>

    <button class="save-btn" onclick="saveRecord()">この日の記録を保存</button>
  </div>

  <!-- 検査タブ -->
  <div id="sec-exams" class="section">
    <div class="card">
      <div class="card-title">検査・処置の記録を追加</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="row">
          <select class="input-sm" id="examType" style="flex:0 0 auto;width:130px;">
            <option>血液検査</option><option>CT</option><option>MRI</option>
            <option>レントゲン</option><option>PET</option><option>病理検査</option><option>その他</option>
          </select>
          <input class="input-sm" type="date" id="examDate" style="flex:1">
        </div>
        <textarea class="textarea" id="examNote" placeholder="結果・所見・気になる数値など..." style="min-height:70px;"></textarea>
        <div class="photo-drop" onclick="document.getElementById('examPhotoInput').click()" style="padding:12px;">
          📎 画像を添付（写メ可）
        </div>
        <input type="file" id="examPhotoInput" accept="image/*" multiple style="display:none" onchange="addPhotos(this,'examPhotoThumbs','examPhotosArr')">
        <div class="thumbs" id="examPhotoThumbs"></div>
        <button class="save-btn" style="margin-bottom:0" onclick="addExam()">追加する</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">検査履歴</div>
      <div id="examList"><div class="empty">検査記録はまだありません</div></div>
    </div>
  </div>

  <!-- 履歴タブ -->
  <div id="sec-history" class="section">
    <div class="card">
      <div class="card-title">バイタル推移（直近14日）</div>
      <div class="chart-wrap"><canvas id="vitalChart"></canvas></div>
    </div>
    <div id="historyList"><div class="empty">記録がありません</div></div>
  </div>

  <!-- AI調査タブ -->

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// =============================================
// 設定（Google Drive API）
// =============================================
// ★ここにご自身のGoogle Client IDを入力してください
// Google Cloud Console → APIとサービス → 認証情報 → OAuthクライアントID で取得
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID_HERE';
const DRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILENAME = 'lung_cancer_diary_data.json';

// =============================================
// State
// =============================================
const LOCAL_KEY = 'lungDiary_v3';
let currentDate = new Date();
let selectedCondition = 0;
let recPhotos = [];
let examPhotosArr = [];
let vChart = null;
let driveAccessToken = null;
let driveFileId = null;
let isSyncing = false;

// =============================================
// Utility
// =============================================
function gdk(d) { return d.toISOString().split('T')[0]; }
function today() { return gdk(new Date()); }

function loadLocal() {
  try {
    return JSON.parse(localStorage.getItem(LOCAL_KEY) || '{"records":{},"exams":[],"aiLogs":[]}');
  } catch(e) { return { records:{}, exams:[], aiLogs:[] }; }
}
function saveLocal(d) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(d)); } catch(e) {}
}

function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function formatDate(d) {
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

// =============================================
// Date navigation
// =============================================
function changeDate(delta) {
  if (delta === 0) { currentDate = new Date(); }
  else { currentDate = new Date(currentDate); currentDate.setDate(currentDate.getDate() + delta); }
  document.getElementById('headerDate').textContent = formatDate(currentDate);
  loadRecordForDate();
}

// =============================================
// Tab / Mode switching
// =============================================
function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'history') renderHistory();
  if (tab === 'ai') renderAiLogs();
  if (tab === 'exams') renderExamList();
}

function switchAiMode(mode, btn) {
  document.querySelectorAll('.ai-mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ai-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ai-panel-' + mode).classList.add('active');
}

// =============================================
// Record
// =============================================
function toggleChip(el) { el.classList.toggle('selected'); }

function selectCond(val, btn) {
  selectedCondition = val;
  document.querySelectorAll('.cond-btn').forEach(b => { b.className = 'cond-btn'; });
  btn.classList.add('sel-' + val);
}

function addPhotos(input, thumbId, arrName) {
  const wrap = document.getElementById(thumbId);
  Array.from(input.files).forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      if (arrName === 'recPhotos') recPhotos.push(e.target.result);
      else examPhotosArr.push(e.target.result);
      const wrap2 = document.getElementById(thumbId);
      const wdiv = document.createElement('div');
      wdiv.className = 'thumb-del-wrap';
      const img = document.createElement('img');
      img.src = e.target.result; img.className = 'thumb';
      const del = document.createElement('button');
      del.className = 'thumb-del'; del.textContent = '×';
      del.onclick = () => {
        const idx = arrName === 'recPhotos'
          ? recPhotos.indexOf(e.target.result)
          : examPhotosArr.indexOf(e.target.result);
        if (idx > -1) {
          if (arrName === 'recPhotos') recPhotos.splice(idx,1);
          else examPhotosArr.splice(idx,1);
        }
        wdiv.remove();
      };
      wdiv.appendChild(img); wdiv.appendChild(del); wrap2.appendChild(wdiv);
    };
    r.readAsDataURL(file);
  });
  input.value = '';
}

function getSelectedEvents() {
  return Array.from(document.querySelectorAll('.chip.selected')).map(c => c.dataset.val);
}

function saveRecord() {
  const data = loadLocal();
  const key = gdk(currentDate);
  data.records[key] = {
    spo2: document.getElementById('spo2').value,
    pulse: document.getElementById('pulse').value,
    bpSys: document.getElementById('bpSys').value,
    bpDia: document.getElementById('bpDia').value,
    weight: document.getElementById('weight').value,
    temp: document.getElementById('temp').value,
    condition: selectedCondition,
    events: getSelectedEvents(),
    note: document.getElementById('noteText').value,
    photos: recPhotos.slice(),
    savedAt: new Date().toISOString()
  };
  saveLocal(data);
  showToast('保存しました ✓');
  if (driveAccessToken) syncToDrive(data);
}

function loadRecordForDate() {
  const data = loadLocal();
  const key = gdk(currentDate);
  const rec = data.records[key];
  ['spo2','pulse','bpSys','bpDia','weight','temp'].forEach(id => {
    document.getElementById(id).value = rec ? (rec[id] || '') : '';
  });
  document.getElementById('noteText').value = rec ? (rec.note || '') : '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.cond-btn').forEach(b => { b.className = 'cond-btn'; });
  selectedCondition = 0;
  document.getElementById('photoThumbs').innerHTML = '';
  recPhotos = [];
  if (rec) {
    if (rec.events) rec.events.forEach(ev => {
      document.querySelectorAll('.chip').forEach(c => { if (c.dataset.val === ev) c.classList.add('selected'); });
    });
    if (rec.condition) {
      selectedCondition = rec.condition;
      const condBtns = document.querySelectorAll('.cond-btn');
      const condMap = {5:0,4:1,3:2,2:3,1:4};
      const idx = condMap[rec.condition];
      if (idx !== undefined) condBtns[idx].classList.add('sel-' + rec.condition);
    }
    if (rec.photos && rec.photos.length) {
      const wrap = document.getElementById('photoThumbs');
      rec.photos.forEach(src => {
        recPhotos.push(src);
        const wdiv = document.createElement('div'); wdiv.className = 'thumb-del-wrap';
        const img = document.createElement('img'); img.src = src; img.className = 'thumb';
        wdiv.appendChild(img); wrap.appendChild(wdiv);
      });
    }
  }
}

// =============================================
// Exams
// =============================================
function addExam() {
  const data = loadLocal();
  const exam = {
    id: Date.now(),
    type: document.getElementById('examType').value,
    date: document.getElementById('examDate').value,
    note: document.getElementById('examNote').value,
    photos: examPhotosArr.slice()
  };
  if (!exam.date) { showToast('日付を入力してください'); return; }
  data.exams.unshift(exam); saveLocal(data);
  document.getElementById('examNote').value = '';
  document.getElementById('examPhotoThumbs').innerHTML = '';
  examPhotosArr = [];
  renderExamList(); showToast('検査記録を追加しました ✓');
  if (driveAccessToken) syncToDrive(data);
}

function deleteExam(id) {
  const data = loadLocal();
  data.exams = data.exams.filter(e => e.id !== id);
  saveLocal(data); renderExamList();
  if (driveAccessToken) syncToDrive(data);
}

function renderExamList() {
  const data = loadLocal();
  const list = document.getElementById('examList');
  if (!data.exams || !data.exams.length) { list.innerHTML = '<div class="empty">検査記録はまだありません</div>'; return; }
  list.innerHTML = data.exams.map(e => `
    <div class="exam-item">
      <div class="exam-body">
        <div style="margin-bottom:5px">
          <span class="badge blue">${e.type}</span>
          <span style="font-size:12px;color:var(--text2)">${e.date || ''}</span>
        </div>
        ${e.note ? `<div style="font-size:13px;line-height:1.6;color:var(--text)">${e.note}</div>` : ''}
        ${e.photos && e.photos.length ? `<div class="thumbs" style="margin-top:8px">${e.photos.map(p => `<img src="${p}" class="thumb">`).join('')}</div>` : ''}
      </div>
      <span class="exam-del" onclick="deleteExam(${e.id})">削除</span>
    </div>`).join('');
}

// =============================================
// History
// =============================================
function condLabel(v) { return ['','かなり辛い','しんどい','普通','まあまあ','良好'][v] || ''; }
function condBadgeClass(v) { return ['','red','','amber','','green'][v] || ''; }

function renderHistory() {
  const data = loadLocal();
  const keys = Object.keys(data.records).sort().reverse().slice(0, 30);
  const list = document.getElementById('historyList');
  if (!keys.length) { list.innerHTML = '<div class="empty">記録がありません</div>'; return; }
  list.innerHTML = keys.map(k => {
    const r = data.records[k];
    const vitals = [];
    if (r.spo2) vitals.push(`SpO2: ${r.spo2}%`);
    if (r.pulse) vitals.push(`脈拍: ${r.pulse}`);
    if (r.bpSys && r.bpDia) vitals.push(`血圧: ${r.bpSys}/${r.bpDia}`);
    if (r.temp) vitals.push(`体温: ${r.temp}°C`);
    if (r.weight) vitals.push(`体重: ${r.weight}kg`);
    const condBadge = r.condition ? `<span class="badge ${condBadgeClass(r.condition)}">${condLabel(r.condition)}</span>` : '';
    const evBadges = r.events && r.events.length ? r.events.map(e => `<span class="badge blue">${e}</span>`).join('') : '';
    return `<div class="history-item">
      <div class="history-date">${k} ${condBadge}</div>
      ${evBadges ? `<div class="vitals-row">${evBadges}</div>` : ''}
      <div class="vitals-row">${vitals.map(v => `<span class="badge">${v}</span>`).join('')}</div>
      ${r.note ? `<div class="history-note">${r.note}</div>` : ''}
    </div>`;
  }).join('');
  renderVitalChart(data);
}

function renderVitalChart(data) {
  const keys = Object.keys(data.records).sort().slice(-14);
  const labels = keys.map(k => k.slice(5).replace('-', '/'));
  const spo2Data = keys.map(k => parseFloat(data.records[k].spo2) || null);
  const tempData = keys.map(k => parseFloat(data.records[k].temp) || null);
  const ctx = document.getElementById('vitalChart');
  if (!ctx) return;
  if (vChart) { vChart.destroy(); }
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const tickColor = isDark ? '#6b6660' : '#a09b96';
  vChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'SpO2(%)', data: spo2Data, borderColor: '#4a8fd4', backgroundColor: 'transparent', tension: 0.35, pointRadius: 3, spanGaps: true },
        { label: '体温(×10)', data: tempData.map(v => v ? v * 10 : null), borderColor: '#e8aa50', backgroundColor: 'transparent', tension: 0.35, pointRadius: 3, spanGaps: true }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { size: 11, family: "'Noto Sans JP', sans-serif" }, boxWidth: 12, color: tickColor } } },
      scales: {
        x: { ticks: { font: { size: 10 }, color: tickColor }, grid: { color: gridColor } },
        y: { ticks: { font: { size: 10 }, color: tickColor }, grid: { color: gridColor } }
      }
    }
  });
}

// =============================================
// AI
// =============================================
async function askAI() {
  const q = document.getElementById('aiQuery').value.trim();
  if (!q) { showToast('質問を入力してください'); return; }
  const btn = document.getElementById('aiAskBtn');
  btn.innerHTML = '<span class="spinner"></span> 質問中...';
  btn.disabled = true;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'あなたは肺がん患者の家族をサポートするアシスタントです。医療的な質問に対して、わかりやすい日本語で優しく丁寧に答えてください。最初に「※この情報は参考であり、最終的な判断は必ず担当医にご相談ください。」と一言添えた上で回答してください。',
        messages: [{ role: 'user', content: q }]
      })
    });
    const d = await resp.json();
    const answer = d.content && d.content[0] ? d.content[0].text : '回答を取得できませんでした。';
    const data = loadLocal();
    if (!data.aiLogs) data.aiLogs = [];
    data.aiLogs.unshift({ id: Date.now(), query: q, answer, source: 'Claude', date: gdk(currentDate) });
    saveLocal(data);
    document.getElementById('aiQuery').value = '';
    renderAiLogs();
    showToast('回答を記録しました ✓');
    if (driveAccessToken) syncToDrive(data);
  } catch(e) {
    showToast('エラーが発生しました');
  }
  btn.textContent = 'Claudeに質問して記録する';
  btn.disabled = false;
}

function savePasteLog() {
  const q = document.getElementById('pasteQuestion').value.trim();
  const a = document.getElementById('pasteAnswer').value.trim();
  if (!q || !a) { showToast('質問と回答を入力してください'); return; }
  const source = document.getElementById('aiSource').value;
  const data = loadLocal();
  if (!data.aiLogs) data.aiLogs = [];
  data.aiLogs.unshift({ id: Date.now(), query: q, answer: a, source, date: gdk(currentDate) });
  saveLocal(data);
  document.getElementById('pasteQuestion').value = '';
  document.getElementById('pasteAnswer').value = '';
  renderAiLogs();
  showToast('記録しました ✓');
  if (driveAccessToken) syncToDrive(data);
}

function deleteAiLog(id) {
  const data = loadLocal();
  data.aiLogs = data.aiLogs.filter(l => l.id !== id);
  saveLocal(data); renderAiLogs();
  if (driveAccessToken) syncToDrive(data);
}

function renderAiLogs() {
  const data = loadLocal();
  const list = document.getElementById('aiLogList');
  if (!data.aiLogs || !data.aiLogs.length) { list.innerHTML = '<div class="empty">調査記録はまだありません</div>'; return; }
  list.innerHTML = data.aiLogs.map(l => `
    <div class="ai-log-item">
      <div class="ai-log-q">${l.query}</div>
      <div class="ai-log-a">${l.answer || ''}</div>
      <div class="ai-log-foot">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:11px;color:var(--text3)">${l.date || ''}</span>
          <span class="badge">${l.source || 'AI'}</span>
        </div>
        <span class="ai-log-del" onclick="deleteAiLog(${l.id})">削除</span>
      </div>
    </div>`).join('');
}

// =============================================
// Google Drive
// =============================================
function setDriveStatus(state, msg) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const loginBtn = document.getElementById('driveLoginBtn');
  const syncBtn = document.getElementById('syncBtn');
  dot.className = 'status-dot ' + state;
  text.textContent = msg;
  if (state === 'connected') {
    loginBtn.textContent = 'ログアウト';
    loginBtn.onclick = driveLogout;
    loginBtn.className = 'drive-btn';
    syncBtn.style.display = 'block';
  } else if (state === 'syncing') {
    syncBtn.style.display = 'block';
  } else {
    loginBtn.textContent = 'Googleでログイン';
    loginBtn.onclick = driveLogin;
    loginBtn.className = 'drive-btn primary';
    syncBtn.style.display = 'none';
  }
}

function driveLogin() {
  if (!window.google || GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID_HERE') {
    showToast('Google Client IDを設定してください', 4000);
    showSetupGuide();
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPES,
    callback: async (resp) => {
      if (resp.access_token) {
        driveAccessToken = resp.access_token;
        setDriveStatus('syncing', '同期中...');
        await loadFromDrive();
        setDriveStatus('connected', 'Googleドライブ: 接続済み');
        showToast('Googleドライブに接続しました ✓');
      }
    }
  });
  client.requestAccessToken();
}

function driveLogout() {
  driveAccessToken = null;
  driveFileId = null;
  setDriveStatus('', 'Googleドライブ: 未接続');
  showToast('ログアウトしました');
}

async function manualSync() {
  if (!driveAccessToken) return;
  setDriveStatus('syncing', '同期中...');
  const data = loadLocal();
  await syncToDrive(data);
  setDriveStatus('connected', 'Googleドライブ: 接続済み');
  showToast('同期しました ✓');
}

async function findDriveFile() {
  const resp = await fetch(
    `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILENAME}'&fields=files(id,name,modifiedTime)`,
    { headers: { Authorization: 'Bearer ' + driveAccessToken } }
  );
  const d = await resp.json();
  return d.files && d.files.length ? d.files[0] : null;
}

async function loadFromDrive() {
  try {
    const file = await findDriveFile();
    if (!file) { await syncToDrive(loadLocal()); return; }
    driveFileId = file.id;
    const resp = await fetch(
      `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
      { headers: { Authorization: 'Bearer ' + driveAccessToken } }
    );
    const driveData = await resp.json();
    const localData = loadLocal();
    // Merge: prefer newer entries
    const merged = mergeData(localData, driveData);
    saveLocal(merged);
    loadRecordForDate();
    renderExamList();
    renderAiLogs();
  } catch(e) { console.error('Drive load error', e); }
}

function mergeData(local, remote) {
  const merged = { records: {}, exams: [], aiLogs: [] };
  const allKeys = new Set([...Object.keys(local.records || {}), ...Object.keys(remote.records || {})]);
  allKeys.forEach(k => {
    const l = (local.records || {})[k];
    const r = (remote.records || {})[k];
    if (!l) merged.records[k] = r;
    else if (!r) merged.records[k] = l;
    else merged.records[k] = new Date(l.savedAt || 0) >= new Date(r.savedAt || 0) ? l : r;
  });
  const allExamIds = new Set([...(local.exams || []).map(e => e.id), ...(remote.exams || []).map(e => e.id)]);
  allExamIds.forEach(id => {
    const e = [...(local.exams || []), ...(remote.exams || [])].find(x => x.id === id);
    if (e) merged.exams.push(e);
  });
  merged.exams.sort((a, b) => b.id - a.id);
  const allLogIds = new Set([...(local.aiLogs || []).map(l => l.id), ...(remote.aiLogs || []).map(l => l.id)]);
  allLogIds.forEach(id => {
    const l = [...(local.aiLogs || []), ...(remote.aiLogs || [])].find(x => x.id === id);
    if (l) merged.aiLogs.push(l);
  });
  merged.aiLogs.sort((a, b) => b.id - a.id);
  return merged;
}

async function syncToDrive(data) {
  if (!driveAccessToken || isSyncing) return;
  isSyncing = true;
  try {
    const body = JSON.stringify(data);
    const blob = new Blob([body], { type: 'application/json' });
    if (!driveFileId) {
      const file = await findDriveFile();
      if (file) driveFileId = file.id;
    }
    if (driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + driveAccessToken, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const meta = { name: DRIVE_FILENAME, parents: ['appDataFolder'] };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
      form.append('file', blob);
      const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + driveAccessToken },
        body: form
      });
      const created = await resp.json();
      driveFileId = created.id;
    }
  } catch(e) { console.error('Drive sync error', e); }
  isSyncing = false;
}

// Setup guide

function showSetupGuide() {
  const existing = document.getElementById('setupModal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay'; overlay.id = 'setupModal';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Googleドライブ連携の設定</h3>
      <p>
        Googleドライブ同期を使うには、<strong>Google Cloud Console</strong>でOAuthクライアントIDを取得し、
        このHTMLファイルの冒頭の<br>
        <code style="font-size:11px;background:var(--surface2);padding:2px 6px;border-radius:4px">YOUR_GOOGLE_CLIENT_ID_HERE</code><br>
        を書き換えてください。<br><br>
        手順：<br>
        1. <a href="https://console.cloud.google.com" target="_blank" style="color:var(--blue)">console.cloud.google.com</a> を開く<br>
        2. 新しいプロジェクトを作成<br>
        3. 「APIとサービス」→「認証情報」→「OAuthクライアントID」を作成（種類: ウェブアプリ）<br>
        4. このHTMLファイルを開くURL（例: file:///...）を「承認済みのJavaScriptオリジン」に追加<br>
        5. 生成されたクライアントIDをHTMLに貼り付ける
      </p>
      <div class="modal-btns">
        <button onclick="document.getElementById('setupModal').remove()" style="background:var(--surface2);color:var(--text)">閉じる</button>

    </div>`;
